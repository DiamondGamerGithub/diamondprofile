name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build clean static site folder
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html
          cp style.css _site/style.css
          cp script.js _site/script.js
          cp intro.js _site/intro.js
          cp smoothscroll.js _site/smoothscroll.js
          cp mobileindex.html _site/mobileindex.html
          cp mobilestyle.css _site/mobilestyle.css
          cp mobilescript.js _site/mobilescript.js
          printf '\n/* Smooth scroll injected by workflow */\n' >> _site/script.js
          cat smoothscroll.js >> _site/script.js
          printf '\n/* Smooth scroll injected by workflow */\n' >> _site/mobilescript.js
          cat smoothscroll.js >> _site/mobilescript.js
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          if [ -d assets ]; then cp -R assets _site/assets; fi
          touch _site/.nojekyll
          echo "Prepared clean Pages artifact:"
          find _site -maxdepth 3 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: _site

      - name: Wait for Pages deployment slot
        run: sleep 20

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
